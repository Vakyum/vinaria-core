name: Snapshot Build

on:
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B clean package

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create snapshot tag
        run: |
          git tag v1.0.0-SNAPSHOT.${{ steps.sha.outputs.short_sha }}
          git push origin v1.0.0-SNAPSHOT.${{ steps.sha.outputs.short_sha }}

      - name: Create GitHub Release (pre-release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-SNAPSHOT.${{ steps.sha.outputs.short_sha }}
          prerelease: true
          files: target/*.jar